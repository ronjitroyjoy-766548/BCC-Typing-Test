<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Project Bengal | Login Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 95%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div class="auth-card" id="login-form">
    <h2>Project Bengal</h2>
    <input type="text" id="mobile" placeholder="মোবাইল নম্বর">
    <input type="password" id="password" placeholder="পাসওয়ার্ড">
    <button onclick="loginUser()">লগইন</button>
</div>

<script>
    // আপনার Supabase কনফিগারেশন
    const SUPABASE_URL = 'https://cqnnbwdkysztchcgsvob.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_ZrZAEXpeA434K3aqO8zZ-A_ke7lHTZ7';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loginUser() {
        const mobile = document.getElementById('mobile').value;
        const password = document.getElementById('password').value;

        // এটি এখন আপনার ডাটাবেজে চেক করবে
        const { data, error } = await supabase
            .from('users') // আপনার টেবিলের নাম
            .select('*')
            .eq('mobile', mobile)
            .eq('password', password)
            .single();

        if (error) {
            alert("লগইন ব্যর্থ! নম্বর বা পাসওয়ার্ড ভুল।");
        } else {
            alert("স্বাগতম! ড্যাশবোর্ডে প্রবেশ করছেন...");
            // এখানে সফল লগইনের পর ড্যাশবোর্ড পেজে পাঠানোর কোড বসবে
        }
    }
</script>

</body>
</html>
